[build]
command = "npx vite build"
publish = "dist"

[[redirects]]
from = "/proof"
to = "https://www.trustpilot.com/review/retralabs.in"
status = 301
force = true

[[redirects]]
from = "/reviews"
to = "https://www.trustpilot.com/review/retralabs.in"
status = 301
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"